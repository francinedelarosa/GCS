<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Requests - UNITYCARE</title>

<link rel="stylesheet" href="styles.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* SETTINGS DROPDOWN */
.settings-wrapper {
  position: relative;
}

.settings-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
}

.settings-btn:hover {
  background: rgba(0,0,0,0.06);
}

.settings-dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 40px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 160px;
  z-index: 999;
  flex-direction: column;
}

.settings-dropdown a,
.settings-dropdown button {
  padding: 10px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  width: 100%;
  color: var(--text);
}

.settings-dropdown a:hover,
.settings-dropdown button:hover {
  background: rgba(0,0,0,0.05);
}
</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<nav class="sidebar">

  <div>

    <!-- LOGO -->
    <div class="logo-bar">

      <div class="logo">
        <img src="logo.png" alt="logo">
        <h3>UNITYCARE</h3>
      </div>

      <div class="settings-wrapper">
        <button class="settings-icon" onclick="toggleSettingsMenu()">
          <i class="fa fa-gear"></i>
        </button>

        <div class="settings-dropdown" id="settingsDropdown">
          <a href="cprofile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="history.html"><i class="fa fa-clock"></i> Session History</a>
          <button onclick="toggleTheme()"><i class="fa fa-moon"></i> Theme</button>
          <button onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
        </div>
      </div>

    </div>

    <!-- MENU -->
    <div class="menu">

      <a href="counselor.html">
        <i class="fa fa-gauge"></i> Dashboard
      </a>

      <p class="menu-title"><i class="fa fa-calendar"></i> Sessions</p>
      <a href="csessions.html"><i class="fa fa-calendar-check"></i> My Sessions</a>
      <a href="cappointments.html" class="active">
        <i class="fa fa-calendar-plus"></i> Appointment Requests
      </a>
      <a href="cconcerns.html"><i class="fa fa-triangle-exclamation"></i> Student Concerns</a>

      <p class="menu-title"><i class="fa fa-user-graduate"></i> Students</p>
      <a href="students.html"><i class="fa fa-users"></i> My Students</a>

      <p class="menu-title"><i class="fa fa-chart-line"></i> Reports</p>
      <a href="reports.html"><i class="fa fa-file"></i> My Reports</a>

      <p class="menu-title"><i class="fa fa-bullhorn"></i> Information</p>
      <a href="cannouncements.html"><i class="fa fa-bullhorn"></i> Announcements</a>
      <a href="creferral.html"><i class="fa fa-route"></i> Referrals</a>

    </div>

  </div>

</nav>

<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <h2>Appointment Requests</h2>
  </div>

  <!-- LIST -->
  <section class="grid">

    <div class="card">
      <h3><i class="fa fa-user"></i> Juan Dela Cruz</h3>
      <p><b>Reason:</b> Stress Counseling</p>
      <p><b>Status:</b> Pending</p>

      <div style="margin-top:10px; display:flex; gap:10px;">
        <button class="btn">
          <i class="fa fa-check"></i> Approve
        </button>

        <button class="btn" style="background: var(--danger);">
          <i class="fa fa-times"></i> Decline
        </button>
      </div>
    </div>

  </section>

</main>

<script>

function toggleSettingsMenu(){
  const menu = document.getElementById("settingsDropdown");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function toggleTheme(){
  const html = document.documentElement;
  html.setAttribute(
    "data-theme",
    html.getAttribute("data-theme") === "light" ? "dark" : "light"
  );
}

function logout(){
  window.location.href = "role.html";
}

/* CLOSE DROPDOWN ON CLICK OUTSIDE */
document.addEventListener("click", function(e) {
  const dropdown = document.getElementById("settingsDropdown");
  const btn = document.querySelector(".settings-icon");

  if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.style.display = "none";
  }
});

</script>

</script>

</body>
</html>
