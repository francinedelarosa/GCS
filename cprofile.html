<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Counselor</title>

<link rel="stylesheet" href="styles.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* SIDEBAR HEADER + SETTINGS */
.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.settings-wrapper {
  position: relative;
}

.settings-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text);
}

.settings-dropdown {
  position: absolute;
  right: 0;
  top: 35px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: none;
  flex-direction: column;
  min-width: 160px;
  z-index: 1000;
}

.settings-dropdown a,
.settings-dropdown button {
  padding: 10px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
}

.settings-dropdown a:hover,
.settings-dropdown button:hover {
  background: rgba(0,0,0,0.05);
}

/* PROFILE */
.profile-top {
  display: flex;
  align-items: center;
  gap: 15px;
}

.profile-pic {
  position: relative;
  width: 100px;
  height: 100px;
}

.profile-pic img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--primary);
}

.upload-btn {
  position: absolute;
  bottom: 0;
  right: 0;
  background: var(--primary);
  color: white;
  padding: 6px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar">

  <div class="sidebar-header">

    <div class="logo">
      <img src="logo.png" alt="UNITYCARE Logo">
      <h3>UNITYCARE</h3>
    </div>

    <div class="settings-wrapper">
      <button class="settings-btn" onclick="toggleSettings()">
        <i class="fa fa-gear"></i>
      </button>

      <div class="settings-dropdown" id="settingsMenu">
        <a href="cprofile.html"><i class="fa fa-user"></i> Profile</a>
        <button onclick="toggleTheme()"><i class="fa fa-moon"></i> Theme</button>
        <button onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>

  </div>

  <div class="menu">
    <a href="counselor.html"><i class="fa fa-gauge"></i> Dashboard</a>

    <p class="menu-title"><i class="fa fa-calendar"></i> Sessions</p>
    <a href="csessions.html">My Sessions</a>
    <a href="cappointments.html">Appointment Requests</a>
    <a href="cconcerns.html">Student Concerns</a>

    <p class="menu-title"><i class="fa fa-user-graduate"></i> Students</p>
    <a href="students.html">My Students</a>

    <p class="menu-title"><i class="fa fa-chart-line"></i> Reports</p>
    <a href="reports.html">My Reports</a>

    <p class="menu-title"><i class="fa fa-bullhorn"></i> Information</p>
    <a href="cannouncements.html">Announcements</a>
    <a href="creferral.html">Referrals</a>
  </div>

</nav>

<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <h2>My Profile</h2>
  </div>

  <div class="card profile-card">

    <!-- FIXED PROFILE SECTION -->
    <div class="profile-top">

      <div class="profile-pic">
        <img id="preview" src="https://via.placeholder.com/100" alt="Profile Picture">
        <label for="fileUpload" class="upload-btn">
          <i class="fa fa-camera"></i>
        </label>
        <input type="file" id="fileUpload" hidden onchange="loadImage(event)">
      </div>

      <div>
        <h3>Dr. Maria Santos</h3>
        <p class="muted">Guidance Counselor</p>
      </div>

    </div>

    <hr style="margin:15px 0;">

    <label>Full Name</label>
    <input value="Dr. Maria Santos">

    <label>Email</label>
    <input value="maria.santos@unitycare.edu">

    <label>Department</label>
    <input value="Guidance & Counseling">

    <label>Password</label>
    <input type="password" value="password123">

    <button class="btn">Save Changes</button>

  </div>

</main>

<script>
function toggleSettings(){
  const menu = document.getElementById("settingsMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function toggleTheme(){
  const html = document.documentElement;
  html.setAttribute(
    "data-theme",
    html.getAttribute("data-theme") === "dark" ? "light" : "dark"
  );
}

function logout(){
  window.location.href = "role.html";
}

/* PROFILE IMAGE PREVIEW */
function loadImage(event){
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
