<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counselor Register | UNITYCARE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="auth-body">

<div class="auth-container">

  <!-- LEFT -->
  <section class="auth-left">
    <div class="auth-overlay"></div>

 
    <div class="auth-brand">
      <img class="auth-brand-logo" src="logo.png">
      <h1 class="auth-brand-title">UNITYCARE</h1>
      <p class="auth-brand-subtitle">Create your account</p>
    </div>

  </section>

  <!-- RIGHT -->
  <section class="auth-right">

    <div class="auth-box">

      <h2 class="auth-title">Register</h2>

      <p class="auth-subtitle">
        Join UNITYCARE today
      </p>

      <form class="auth-form" onsubmit="event.preventDefault(); registerCounselor();">

        <label>Full Name</label>
        <input type="text" id="name" class="auth-input" required>

        <label>Email</label>
        <input type="email" id="email" class="auth-input" required>

        <label>Password</label>
        <input type="password" id="password" class="auth-input" required>

        <label>Confirm Password</label>
        <input type="password" id="confirm" class="auth-input" required>

        <div class="auth-captcha">
          <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE"></div>
        </div>

        <button class="auth-btn" type="submit">Register</button>

        <div id="error" class="auth-error"></div>

      </form>

      <div class="auth-footer">
        <p>Already have an account?</p>
        <a href="clogin.html">Login here</a>
      </div>

    </div>

  </section>

</div>

<script>
function registerCounselor() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  const error = document.getElementById("error");

  if (!name || !email || !pass || !confirm) {
    error.textContent = "Fill in all fields.";
    return;
  }

  if (pass !== confirm) {
    error.textContent = "Passwords do not match.";
    return;
  }

  if (!grecaptcha.getResponse()) {
    error.textContent = "Complete reCAPTCHA.";
    return;
  }

  error.style.color = "green";
  error.textContent = "Account created...";

  setTimeout(() => {
    window.location.href = "counselor-login.html";
  }, 1500);
}
</script>

</body>
</html>
