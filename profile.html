<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="styles.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="body">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logoBar">

    <div class="sidebar-logo">
      <img src="logo.png" alt="logo">
      <span class="sidebar-logoText">UNITYCARE</span>
    </div>

    <div class="sidebar-settings">
      <button class="sidebar-settingsButton" onclick="toggleSettingsMenu(event)">
        <i class="fa fa-gear"></i>
      </button>

      <div class="sidebar-settingsDropdown" id="settingsDropdown">
        <a href="profile.html" class="active"><i class="fa fa-user"></i> Profile</a>
        <a href="history.html"><i class="fa fa-clock"></i> Session History</a>
        <button onclick="toggleTheme()"><i class="fa fa-moon"></i> Theme</button>
        <button onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>

  </div>

  <nav class="sidebar-menu">
    <a href="dashboard.html"><i class="fa fa-th-large"></i> Dashboard</a>

    <p class="sidebar-title">SERVICES</p>
    <a href="booking.html"><i class="fa fa-calendar"></i> Book Appointment</a>
    <a href="concerns.html"><i class="fa fa-headset"></i> Submit Concern</a>
    <a href="wellness.html"><i class="fa fa-heart"></i> Wellness Check</a>
    <a href="referral.html"><i class="fa fa-route"></i> Referral</a>

    <p class="sidebar-title">UPDATES</p>
    <a href="announcements.html"><i class="fa fa-bullhorn"></i> Announcements</a>

    <p class="sidebar-title">RECORDS</p>
    <a href="documents.html"><i class="fa fa-file"></i> Documents</a>
    <a href="ticket.html"><i class="fa fa-ticket"></i> Tickets</a>

    <p class="sidebar-title">SYSTEM</p>
    <a href="feedback.html"><i class="fa fa-comment"></i> Feedback</a>
  </nav>
</aside>

<!-- TOPBAR -->
<header class="topbar">

  <div class="topbar-left">
    <h1>Student Profile</h1>
  </div>

  <div class="topbar-right">

    <div class="topbar-searchBox">
      <i class="fa fa-search"></i>
      <input type="text" placeholder="Search...">
    </div>

    <div class="topbar-icons">
      <div class="topbar-icon">
        <i class="fa fa-envelope"></i>
        <span class="badge">3</span>
      </div>

      <div class="topbar-icon">
        <i class="fa fa-bell"></i>
        <span class="badge">5</span>
      </div>
    </div>

    <div class="topbar-user">
      <img src="student.jpg" alt="user">
      <div>
        <strong>Juan Dela Cruz</strong>
        <p>juan@email.com</p>
      </div>
    </div>

  </div>

</header>

  <!-- PROFILE -->
  <main class="sProfile-main">

    <div class="sTicket-container">
    <div class="card sProfile-card">

      <div class="sProfile-header">

        <div class="sProfile-avatar">
          <img id="preview" src="https://via.placeholder.com/120">
          <label for="fileUpload" class="sProfile-upload">
            <i class="fa fa-camera"></i>
          </label>
          <input type="file" id="fileUpload" hidden onchange="loadImage(event)">
        </div>

        <div>
          <h3 id="displayName">Student Name</h3>
          <p class="sProfile-muted">Edit your personal information</p>
        </div>

      </div>

      <div class="sProfile-form">

        <div class="form-group">
          <label>Full Name</label>
          <input id="name" type="text" placeholder="Enter name">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Course</label>
          <input id="course" type="text" placeholder="Enter course">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input id="phone" type="text" placeholder="Enter phone number">
        </div>

        <button class="btn sProfile-saveBtn" onclick="saveProfile()">
          Save Profile
        </button>

        <div id="status" class="sProfile-status"></div>

      </div>

    </div>

  </div>

</main>

<script>
  function toggleSettingsMenu(e){
  e.stopPropagation();
  document.getElementById("settingsDropdown").classList.toggle("show");
}

function toggleTheme(){
  const html = document.documentElement;
  html.setAttribute(
    "data-theme",
    html.getAttribute("data-theme") === "light" ? "dark" : "light"
  );
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
/* dropdown close fix */
document.addEventListener("click", e => {
  const menu = document.getElementById("settingsDropdown");
  const btn = document.querySelector(".sidebar-settingsButton");

  if (!menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove("show");
  }
});

function loadImage(event) {
  document.getElementById('preview').src =
    URL.createObjectURL(event.target.files[0]);
}

function saveProfile() {
  const name = document.getElementById("name").value;

  if (name) {
    document.getElementById("displayName").innerText = name;
  }

  document.getElementById("status").innerHTML =
    "<span class='tag info'>Profile updated successfully</span>";
}

</script>

</body>
</html>
